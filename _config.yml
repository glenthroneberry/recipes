title: My Recipe Book

description: A collection of recipes from contributors 

baseurl: "/recipes"
url: ""

# Full URL to your GitHub repo (used for the "+ Add a Recipe" link)
github_repo_url: "https://github.com/glenthroneberry/recipes"

# Order that recipe categories/sections appear on the homepage.
# Any recipe with a category not listed here falls into "Other" at the end.
category_order:
  - Breakfast
  - Lunch
  - Dinner
  - Snacks
  - Sides
  - Drinks
  - Dessert

# Tell Jekyll to treat everything in _recipes as a "recipes" collection
collections:
  recipes:
    output: true
    permalink: /:path/

# Default layout for anything in the recipes collection
defaults:
  - scope:
      path: ""
      type: recipes
    values:
      layout: recipe

markdown: kramdown
