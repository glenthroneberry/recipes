title: My Recipe Book
description: A collection of recipes I love
baseurl: "/recipes"   # leave blank if using yourname.github.io, else "/reponame"
url: ""

# Tell Jekyll to treat everything in _recipes as a "recipes" collection
collections:
  recipes:
    output: true
    permalink: /recipes/:path/

# Default layout for anything in the recipes collection
defaults:
  - scope:
      path: ""
      type: recipes
    values:
      layout: recipe

markdown: kramdown
