---
layout: default
title: Meal Planner
---

<link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">

<header>
  <a href="{{ '/' | relative_url }}">&larr; All Recipes</a>
  <h1>Meal Planner</h1>
  <p>Pick the recipes you're making this week and get one combined shopping list.</p>
</header>

<main>
  <section id="recipe-picker">
    <p class="loading">Loading recipes&hellip;</p>
  </section>

  <section id="shopping-list-section" style="display:none;">
    <div class="shopping-list-header">
      <h2>Shopping List</h2>
      <div class="list-actions">
        <button id="copy-btn" type="button">Copy</button>
        <button id="print-btn" type="button">Print</button>
        <button id="reset-checks-btn" type="button">Uncheck all</button>
      </div>
    </div>
    <ul id="shopping-list"></ul>
  </section>
</main>

<script src="{{ '/assets/planner.js' | relative_url }}"></script>
